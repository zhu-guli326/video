<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="obs-browser" content="width=640,height=640,fps=30,shutdown=false,refresh=true">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      --accent: #2dd4bf;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    .bubble {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      overflow: hidden;
      background:
        radial-gradient(circle at 35% 24%, rgba(255, 255, 255, 0.58), transparent 24%),
        radial-gradient(circle at 72% 76%, rgba(45, 212, 191, 0.34), transparent 30%),
        linear-gradient(145deg, rgba(245, 248, 252, 0.94), rgba(188, 205, 216, 0.78));
      box-shadow:
        0 34px 110px rgba(0, 0, 0, 0.38),
        0 0 0 1px rgba(255, 255, 255, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.72);
    }

    .bubble::before {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: inherit;
      background:
        radial-gradient(circle at 50% 36%, rgba(19, 31, 40, 0.76) 0 17%, transparent 18%),
        radial-gradient(ellipse at 50% 76%, rgba(19, 31, 40, 0.72) 0 30%, transparent 31%);
      filter: blur(1px);
      opacity: 0.62;
    }

    .bubble::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.34), transparent 42%),
        radial-gradient(circle at 50% 50%, transparent 52%, rgba(0, 0, 0, 0.13) 100%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bubble"></div>
</body>
</html>
