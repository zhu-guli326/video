<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="obs-browser" content="width=220,height=220,fps=60,shutdown=false,refresh=true">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    .cursor {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sprite {
      display: block;
      width: 220px;
      height: 220px;
      object-fit: contain;
      transform-origin: 50% 50%;
      filter:
        drop-shadow(0 10px 16px rgba(0, 0, 0, 0.28))
        drop-shadow(0 22px 30px rgba(0, 0, 0, 0.2));
      user-select: none;
      -webkit-user-drag: none;
      will-change: opacity, transform;
    }

    body[data-state="click"] .sprite.click {
      animation: click-pop 720ms cubic-bezier(.16, 1, .22, 1) both;
    }

    @keyframes click-pop {
      0% {
        opacity: 0;
        transform: scale(0.5) rotate(-16deg);
      }
      12% {
        opacity: 1;
      }
      42% {
        transform: scale(1.02) rotate(-7deg);
      }
      100% {
        opacity: 1;
        transform: scale(0.94) rotate(-9deg);
      }
    }
  </style>
</head>
<body data-state="idle">
  <div class="cursor">
    <img id="cursorSprite" class="sprite idle" src="assets/cursor-before-220.png" alt="" draggable="false">
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const clickHoldMs = 720;
    const assetVersion = params.get("v") || String(Date.now());
    let clickUntil = 0;

    function setState(state) {
      document.body.dataset.state = state;
      const sprite = document.getElementById("cursorSprite");
      sprite.className = "sprite " + state;
      sprite.src = state === "click"
        ? "assets/cursor-click-220.png?v=" + encodeURIComponent(assetVersion)
        : "assets/cursor-before-220.png?v=" + encodeURIComponent(assetVersion);
    }

    function boot() {
      if (params.get("state") === "click") {
        clickUntil = performance.now() + clickHoldMs;
        setState("click");
      } else {
        setState("idle");
      }
    }

    function render() {
      if (clickUntil > 0 && performance.now() > clickUntil) {
        clickUntil = 0;
        setState("idle");
      }
      requestAnimationFrame(render);
    }

    boot();
    requestAnimationFrame(render);
  </script>
</body>
</html>
