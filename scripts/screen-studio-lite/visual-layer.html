<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="obs-browser" content="width=1920,height=1080,fps=60,shutdown=false,refresh=true">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Screen Studio Lite Visual Layer</title>
  <style>
    :root {
      --accent-a: #2dd4bf;
      --accent-b: #8b5cf6;
      --accent-c: #f7c948;
      --card-fill: rgba(12, 16, 22, 0.62);
      --card-line: rgba(255, 255, 255, 0.24);
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      font-family: Inter, "Segoe UI", Arial, sans-serif;
    }

    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 16% 16%, rgba(45, 212, 191, 0.22), transparent 28%),
        radial-gradient(circle at 82% 24%, rgba(247, 201, 72, 0.18), transparent 24%),
        linear-gradient(135deg, #101722 0%, #25213b 48%, #1d2e2c 100%);
    }

    body[data-style="graphite"] .stage {
      background:
        radial-gradient(circle at 24% 20%, rgba(93, 116, 149, 0.22), transparent 30%),
        radial-gradient(circle at 78% 78%, rgba(237, 187, 79, 0.16), transparent 28%),
        linear-gradient(135deg, #121417 0%, #2c3138 52%, #151b1f 100%);
    }

    body[data-style="fresh"] .stage {
      background:
        radial-gradient(circle at 20% 22%, rgba(53, 163, 239, 0.22), transparent 28%),
        radial-gradient(circle at 82% 72%, rgba(242, 126, 87, 0.18), transparent 26%),
        linear-gradient(135deg, #eef7f4 0%, #dbe8ff 48%, #f7eee3 100%);
    }

    body[data-style="mono"] .stage {
      background:
        radial-gradient(circle at 18% 18%, rgba(255, 255, 255, 0.14), transparent 24%),
        linear-gradient(135deg, #111111 0%, #3c3c3c 52%, #181818 100%);
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.16;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent 82%);
    }

    .card {
      position: absolute;
      inset: 8.5%;
      border-radius: 34px;
      border: 1px solid var(--card-line);
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.04)),
        var(--card-fill);
      box-shadow:
        0 38px 120px var(--shadow),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
      pointer-events: none;
    }

    body[data-card="0"] .card {
      display: none;
    }

    .frame-matte {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: none;
      pointer-events: none;
    }

    body[data-mode="background"] .cursor,
    body[data-mode="background"] .click-ring,
    body[data-mode="background"] .keystroke,
    body[data-mode="background"] .grain,
    body[data-mode="background"] .card {
      display: none;
    }

    body[data-mode="background"] .frame-matte,
    body[data-mode="cursor"] .frame-matte {
      display: none;
    }

    body[data-mode="frame"] .stage {
      background: transparent !important;
    }

    body[data-mode="frame"] .card,
    body[data-mode="frame"] .grain {
      display: none;
    }

    body[data-mode="frame"] .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background: transparent;
    }

    body[data-mode="frame"] .grain,
    body[data-mode="frame"] .card,
    body[data-mode="frame"] .cursor,
    body[data-mode="frame"] .click-ring,
    body[data-mode="frame"] .keystroke {
      display: none;
    }

    body[data-mode="frame"] .frame-matte {
      display: none;
    }

    body[data-mode="cursor"] .stage {
      background: transparent;
    }

    body[data-mode="cursor"] .grain,
    body[data-mode="cursor"] .card {
      display: none;
    }

    .cursor {
      position: absolute;
      left: 0;
      top: 0;
      width: 54px;
      height: 54px;
      transform: translate3d(-200px, -200px, 0);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      will-change: transform, opacity;
    }

    .cursor.is-visible {
      opacity: 1;
    }

    .cursor .halo {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 2px solid rgba(255, 255, 255, 0.9);
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.24),
        0 0 0 10px rgba(45, 212, 191, 0.16);
    }

    .cursor .rotor {
      position: absolute;
      inset: 0;
      transform-origin: 50% 50%;
      transition: transform 80ms linear;
    }

    .cursor .pointer {
      position: absolute;
      left: 16px;
      top: 12px;
      width: 22px;
      height: 30px;
      background: white;
      clip-path: polygon(0 0, 0 28px, 8px 21px, 13px 31px, 19px 28px, 14px 18px, 25px 18px);
      filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.38));
    }

    body[data-touch="1"] .cursor .pointer {
      display: none;
    }

    body[data-touch="1"] .cursor .halo {
      background: rgba(255, 255, 255, 0.16);
      box-shadow:
        0 12px 32px rgba(0, 0, 0, 0.28),
        0 0 0 18px rgba(247, 201, 72, 0.16);
    }

    .click-ring {
      position: absolute;
      left: 0;
      top: 0;
      width: 30px;
      height: 30px;
      margin: -15px 0 0 -15px;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.16);
      opacity: 0;
      transform: translate3d(-200px, -200px, 0) scale(0.4);
      pointer-events: none;
    }

    .click-ring.pulse {
      animation: click-pulse 520ms ease-out;
    }

    .keystroke {
      position: absolute;
      left: 50%;
      bottom: 7%;
      min-width: 128px;
      max-width: min(72vw, 720px);
      padding: 13px 22px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(12, 16, 22, 0.72);
      color: #fff;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.1;
      text-align: center;
      letter-spacing: 0;
      opacity: 0;
      transform: translate3d(-50%, 16px, 0) scale(0.96);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.26);
      backdrop-filter: blur(14px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .keystroke.is-visible {
      opacity: 1;
      transform: translate3d(-50%, 0, 0) scale(1);
    }

    body[data-key-position="top"] .keystroke {
      top: 7%;
      bottom: auto;
    }

    @keyframes click-pulse {
      0% {
        opacity: 0.95;
        transform: translate3d(var(--x), var(--y), 0) scale(0.4);
      }
      100% {
        opacity: 0;
        transform: translate3d(var(--x), var(--y), 0) scale(3.4);
      }
    }
  </style>
</head>
<body data-style="aurora" data-card="1" data-touch="0">
  <div class="stage">
    <div class="grain"></div>
    <canvas class="frame-matte" id="frameMatte"></canvas>
    <div class="card"></div>
    <div class="click-ring" id="clickRing"></div>
    <div class="keystroke" id="keystroke"></div>
    <div class="cursor" id="cursor">
      <div class="halo"></div>
      <div class="rotor" id="rotor">
        <div class="pointer"></div>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const cursor = document.getElementById("cursor");
    const rotor = document.getElementById("rotor");
    const clickRing = document.getElementById("clickRing");
    const keystroke = document.getElementById("keystroke");
    const frameMatte = document.getElementById("frameMatte");
    const stateParam = params.get("state") || "";
    const stateUrl = stateParam
      ? (/^https?:\/\//i.test(stateParam) ? `${stateParam}?v=` : `file:///${stateParam.replace(/\\/g, "/")}?v=`)
      : "";
    const cursorEnabled = params.get("cursor") !== "0";
    const rotateEnabled = params.get("rotate") !== "0";
    const idleMs = Number(params.get("idle") || 950);
    const smoothing = Math.min(0.9, Math.max(0.02, Number(params.get("smooth") || 0.2)));
    const cursorScale = Math.min(3, Math.max(0.5, Number(params.get("scale") || 1.35)));
    const shakeThreshold = Math.max(0, Number(params.get("shake") || 1.2));
    const keystrokesEnabled = params.get("keys") !== "0";
    const keystrokeHoldMs = Math.min(5000, Math.max(300, Number(params.get("keyHold") || 1200)));

    document.body.dataset.style = params.get("style") || "aurora";
    document.body.dataset.card = params.get("card") === "0" ? "0" : "1";
    document.body.dataset.touch = params.get("touch") === "1" ? "1" : "0";
    document.body.dataset.mode = params.get("mode") || "background";
    document.body.dataset.keyPosition = params.get("keyPosition") || "bottom";

    function sanitizeColor(value, fallback) {
      return /^#[0-9a-f]{6}$/i.test(value || "") ? value : fallback;
    }

    function hexToRgb(hex) {
      const value = sanitizeColor(hex, "#ffffff").slice(1);
      return {
        r: parseInt(value.slice(0, 2), 16),
        g: parseInt(value.slice(2, 4), 16),
        b: parseInt(value.slice(4, 6), 16)
      };
    }

    function rgba(hex, alpha) {
      const color = hexToRgb(hex);
      return `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`;
    }

    const bgA = sanitizeColor(params.get("bgA"), "#101722");
    const bgB = sanitizeColor(params.get("bgB"), "#25213B");
    const bgC = sanitizeColor(params.get("bgC"), "#1D2E2C");
    const cursorColor = sanitizeColor(params.get("cursorColor"), "#ffffff");
    const accent = sanitizeColor(params.get("accent"), "#2DD4BF");
    const clickColor = sanitizeColor(params.get("clickColor"), "#ffffff");
    const cardInset = Math.min(20, Math.max(0, Number(params.get("cardInset") || 8.5)));
    const cardRadius = Math.min(96, Math.max(0, Number(params.get("cardRadius") || 34)));
    const cardOpacity = Math.min(1, Math.max(0, Number(params.get("cardOpacity") || 62) / 100));
    const shadow = Math.min(0.8, Math.max(0, Number(params.get("shadow") || 34) / 100));
    const frameMargin = Math.max(0, Number(params.get("frameMargin") || 96));
    const frameRadius = Math.max(0, Number(params.get("frameRadius") || cardRadius));
    const fixedBottomBlank = Math.max(0, Number(params.get("fixedBottomBlank") || 0));
    const frameScreen = params.get("frameScreen") !== "0";
    const resetDelayMs = Math.max(0, Number(params.get("resetDelay") || 4200));
    const excludeTaskbar = params.get("excludeTaskbar") !== "0";
    const cameraCutout = params.get("cameraCutout") !== "0";
    const cameraPosition = params.get("cameraPosition") || "bottom-right";
    const cameraSizePct = Math.min(45, Math.max(8, Number(params.get("cameraSizePct") || 22)));
    const cameraMargin = Math.max(0, Number(params.get("cameraMargin") || 80));
    const bgImage = params.get("bgImage") || "";
    const solidBg = params.get("solidBg") === "1";
    let latestFrameState = null;
    let zoomFrameUntil = 0;

    const stage = document.querySelector(".stage");
    let stageBackground = bgA;
    if (!solidBg) {
      stageBackground = bgImage
        ? `linear-gradient(135deg, ${rgba(bgA, 0.72)}, ${rgba(bgB, 0.62)}), url("file:///${bgImage.replace(/\\/g, "/")}") center / cover no-repeat`
        : `radial-gradient(circle at 16% 16%, ${rgba(accent, 0.22)}, transparent 28%), radial-gradient(circle at 82% 24%, ${rgba("#F7C948", 0.18)}, transparent 24%), linear-gradient(135deg, ${bgA} 0%, ${bgB} 48%, ${bgC} 100%)`;
    }
    stage.style.background = stageBackground;
    if (solidBg) {
      document.body.dataset.card = "0";
      const grain = document.querySelector(".grain");
      if (grain) {
        grain.style.display = "none";
      }
    }

    const card = document.querySelector(".card");
    card.style.inset = `${cardInset}%`;
    card.style.borderRadius = `${cardRadius}px`;
    card.style.background = `linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.04)), rgba(12, 16, 22, ${cardOpacity})`;
    card.style.boxShadow = `0 38px 120px rgba(0, 0, 0, ${shadow}), inset 0 1px 0 rgba(255, 255, 255, 0.22)`;
    document.querySelector(".cursor .halo").style.boxShadow = `0 10px 30px rgba(0, 0, 0, 0.24), 0 0 0 10px ${rgba(accent, 0.16)}`;
    document.querySelector(".cursor .halo").style.borderColor = rgba(cursorColor, 0.9);
    document.querySelector(".cursor .pointer").style.background = cursorColor;
    clickRing.style.borderColor = rgba(clickColor, 0.92);

    function roundedRectPath(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + width - r, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r);
      ctx.lineTo(x + width, y + height - r);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      ctx.lineTo(x + r, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawFrameBackground(ctx, width, height) {
      if (solidBg) {
        ctx.fillStyle = bgA;
        ctx.fillRect(0, 0, width, height);
        return;
      }

      const linear = ctx.createLinearGradient(0, 0, width, height);
      linear.addColorStop(0, bgA);
      linear.addColorStop(0.48, bgB);
      linear.addColorStop(1, bgC);
      ctx.fillStyle = linear;
      ctx.fillRect(0, 0, width, height);

      const glowA = ctx.createRadialGradient(width * 0.16, height * 0.16, 0, width * 0.16, height * 0.16, width * 0.28);
      glowA.addColorStop(0, rgba(accent, 0.22));
      glowA.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = glowA;
      ctx.fillRect(0, 0, width, height);

      const glowB = ctx.createRadialGradient(width * 0.82, height * 0.24, 0, width * 0.82, height * 0.24, width * 0.24);
      glowB.addColorStop(0, rgba("#F7C948", 0.18));
      glowB.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = glowB;
      ctx.fillRect(0, 0, width, height);
    }

    function frameAspectFromState(state) {
      if (!state) {
        return 16 / 10;
      }

      const primaryWidth = Number.isFinite(state.primary_width) ? state.primary_width : 0;
      const primaryHeight = Number.isFinite(state.primary_height) ? state.primary_height : 0;
      const workWidth = Number.isFinite(state.work_width) ? state.work_width : 0;
      const workHeight = Number.isFinite(state.work_height) ? state.work_height : 0;
      const width = excludeTaskbar && workWidth > 0 ? workWidth : primaryWidth;
      const height = excludeTaskbar && workHeight > 0 ? workHeight : primaryHeight;

      if (width > 0 && height > 0) {
        return width / height;
      }

      return 16 / 10;
    }

    function fittedScreenRect(width, height) {
      const layoutHeight = Math.max(64, height - Math.min(fixedBottomBlank, Math.max(0, height - 64)));
      const margin = Math.min(frameMargin, width / 2 - 1, layoutHeight / 2 - 1);
      const maxWidth = Math.max(1, width - margin * 2);
      const maxHeight = Math.max(1, layoutHeight - margin * 2);
      const aspect = frameScreen ? frameAspectFromState(latestFrameState) : maxWidth / maxHeight;
      let rectWidth = maxWidth;
      let rectHeight = rectWidth / aspect;

      if (rectHeight > maxHeight) {
        rectHeight = maxHeight;
        rectWidth = rectHeight * aspect;
      }

      return {
        x: (width - rectWidth) * 0.5,
        y: layoutHeight - rectHeight,
        width: rectWidth,
        height: rectHeight
      };
    }

    function cameraCutoutRect(width, height) {
      const size = Math.min(width, height) * (cameraSizePct / 100);
      let x = width - size - cameraMargin;
      let y = height - size - cameraMargin;

      if (cameraPosition === "bottom-left") {
        x = cameraMargin;
      } else if (cameraPosition === "top-right") {
        y = cameraMargin;
      } else if (cameraPosition === "top-left") {
        x = cameraMargin;
        y = cameraMargin;
      } else if (cameraPosition === "center") {
        x = (width - size) * 0.5;
      }

      return { x, y, width: size, height: size };
    }

    function drawRoundedHole(ctx, rect, radius) {
      roundedRectPath(ctx, rect.x, rect.y, rect.width, rect.height, radius);
      ctx.fillStyle = "#000";
      ctx.fill();
    }

    function strokeRoundedRect(ctx, rect, radius, canvasWidth, alpha = 0.28) {
      roundedRectPath(ctx, rect.x, rect.y, rect.width, rect.height, radius);
      ctx.lineWidth = Math.max(1, Math.round(canvasWidth / 3840));
      ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
      ctx.stroke();
    }

    function drawCutoutDepth(ctx, rect, radius, canvasWidth, strength = 1) {
      ctx.save();
      roundedRectPath(ctx, rect.x, rect.y, rect.width, rect.height, radius);
      ctx.shadowColor = `rgba(0, 0, 0, ${0.34 * strength})`;
      ctx.shadowBlur = Math.max(24, canvasWidth * 0.024);
      ctx.shadowOffsetY = Math.max(14, canvasWidth * 0.01);
      ctx.fillStyle = "rgba(0, 0, 0, 0.025)";
      ctx.fill();
      ctx.restore();

      ctx.save();
      roundedRectPath(ctx, rect.x, rect.y, rect.width, rect.height, radius);
      ctx.lineWidth = Math.max(2, Math.round(canvasWidth / 1440));
      ctx.strokeStyle = `rgba(255, 255, 255, ${0.16 * strength})`;
      ctx.stroke();
      ctx.restore();
    }

    function drawFrameMatte() {
      if (!frameMatte) {
        return;
      }

      const width = Math.max(1, Math.floor(innerWidth));
      const height = Math.max(1, Math.floor(innerHeight));
      frameMatte.width = width;
      frameMatte.height = height;

      const ctx = frameMatte.getContext("2d");
      ctx.clearRect(0, 0, width, height);

      const screenRect = fittedScreenRect(width, height);
      const screenRadius = Math.min(frameRadius, Math.max(8, screenRect.height * 0.075));
      const cameraRect = cameraCutout ? cameraCutoutRect(width, height) : null;
      const cameraRadius = cameraRect ? Math.min(cameraRect.width / 2, screenRadius) : 0;
      const zoomActive = performance.now() < zoomFrameUntil;

      if (zoomActive) {
        if (cameraRect) {
          drawCutoutDepth(ctx, cameraRect, cameraRadius, width, 0.5);
          ctx.globalCompositeOperation = "destination-out";
          drawRoundedHole(ctx, cameraRect, cameraRadius);
          ctx.globalCompositeOperation = "source-over";
          strokeRoundedRect(ctx, cameraRect, cameraRadius, width, 0.16);
        }
        return;
      }

      drawFrameBackground(ctx, width, height);
      drawCutoutDepth(ctx, screenRect, screenRadius, width, 1);
      if (cameraRect) {
        drawCutoutDepth(ctx, cameraRect, cameraRadius, width, 0.65);
      }

      ctx.globalCompositeOperation = "destination-out";
      drawRoundedHole(ctx, screenRect, screenRadius);
      if (cameraRect) {
        drawRoundedHole(ctx, cameraRect, cameraRadius);
      }

      ctx.globalCompositeOperation = "source-over";
      strokeRoundedRect(ctx, screenRect, screenRadius, width);
      if (cameraRect) {
        strokeRoundedRect(ctx, cameraRect, cameraRadius, width, 0.2);
      }
    }

    drawFrameMatte();
    addEventListener("resize", drawFrameMatte);

    let targetX = -200;
    let targetY = -200;
    let smoothX = -200;
    let smoothY = -200;
    let lastMove = 0;
    let lastEvent = 0;
    let lastKeyEvent = 0;
    let lastKeyAt = 0;
    let lastTargetX = -200;
    let lastTargetY = -200;
    let cursorAngle = 0;
    let area = { x: 0, y: 0, width: innerWidth, height: innerHeight };

    function parseState(text) {
      const next = {};
      for (const line of text.split(/\r?\n/)) {
        const index = line.indexOf("=");
        if (index > -1) {
          const key = line.slice(0, index);
          const value = line.slice(index + 1);
          if (key === "key_combo") {
            next.key_combo = value;
          } else {
            next[key] = Number(value);
          }
        }
      }
      return next;
    }

    function updateFromState(state) {
      if (!Number.isFinite(state.x) || !Number.isFinite(state.y)) {
        return;
      }

      const previousAspect = frameAspectFromState(latestFrameState);
      latestFrameState = state;
      if (document.body.dataset.mode === "frame" && Math.abs(frameAspectFromState(state) - previousAspect) > 0.001) {
        drawFrameMatte();
      }

      area = {
        x: Number.isFinite(state.virtual_x) ? state.virtual_x : 0,
        y: Number.isFinite(state.virtual_y) ? state.virtual_y : 0,
        width: Number.isFinite(state.virtual_width) && state.virtual_width > 0 ? state.virtual_width : innerWidth,
        height: Number.isFinite(state.virtual_height) && state.virtual_height > 0 ? state.virtual_height : innerHeight
      };

      const nextX = ((state.x - area.x) / area.width) * innerWidth;
      const nextY = ((state.y - area.y) / area.height) * innerHeight;
      const distance = Math.hypot(nextX - targetX, nextY - targetY);

      if (distance >= shakeThreshold) {
        lastTargetX = targetX;
        lastTargetY = targetY;
        targetX = nextX;
        targetY = nextY;
        lastMove = performance.now();
        if (rotateEnabled && Number.isFinite(lastTargetX) && Number.isFinite(lastTargetY)) {
          const dx = targetX - lastTargetX;
          const dy = targetY - lastTargetY;
          if (Math.hypot(dx, dy) > 3) {
            cursorAngle = Math.atan2(dy, dx) * 180 / Math.PI + 45;
          }
        }
      }

      if (Number.isFinite(state.event) && state.event > lastEvent) {
        lastEvent = state.event;
        pulse(targetX, targetY);
        zoomFrameUntil = performance.now() + resetDelayMs + 180;
        if (document.body.dataset.mode === "frame") {
          drawFrameMatte();
        }
      }

      if (keystrokesEnabled && Number.isFinite(state.key_event) && state.key_event > lastKeyEvent && state.key_combo) {
        lastKeyEvent = state.key_event;
        showKeystroke(state.key_combo);
      }
    }

    function showKeystroke(combo) {
      keystroke.textContent = combo.replace(/\+/g, " + ");
      keystroke.classList.add("is-visible");
      lastKeyAt = performance.now();
    }

    function pulse(x, y) {
      clickRing.classList.remove("pulse");
      clickRing.style.setProperty("--x", `${x}px`);
      clickRing.style.setProperty("--y", `${y}px`);
      clickRing.style.transform = `translate3d(${x}px, ${y}px, 0) scale(0.4)`;
      void clickRing.offsetWidth;
      clickRing.classList.add("pulse");
    }

    async function poll() {
      if (!stateUrl || !cursorEnabled) {
        return;
      }

      try {
        const response = await fetch(stateUrl + Date.now(), { cache: "no-store" });
        if (response.ok) {
          updateFromState(parseState(await response.text()));
        }
      } catch (error) {
        // OBS browser source may briefly lock the file while PowerShell writes it.
      }
    }

    function render() {
      const now = performance.now();
      smoothX += (targetX - smoothX) * smoothing;
      smoothY += (targetY - smoothY) * smoothing;
      cursor.style.transform = `translate3d(${smoothX - 27}px, ${smoothY - 27}px, 0) scale(${cursorScale})`;
      rotor.style.transform = rotateEnabled ? `rotate(${cursorAngle}deg)` : "rotate(0deg)";

      const moved = Math.abs(targetX - smoothX) + Math.abs(targetY - smoothY) > 0.8;
      const visible = cursorEnabled && (idleMs <= 0 || moved || now - lastMove < idleMs);
      cursor.classList.toggle("is-visible", visible);
      if (now - lastKeyAt > keystrokeHoldMs) {
        keystroke.classList.remove("is-visible");
      }
      if (document.body.dataset.mode === "frame" && zoomFrameUntil > 0 && now > zoomFrameUntil) {
        zoomFrameUntil = 0;
        drawFrameMatte();
      }
      requestAnimationFrame(render);
    }

    setInterval(poll, 33);
    requestAnimationFrame(render);
  </script>
</body>
</html>
